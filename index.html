<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EAUR Leader Quotes</title>
</head>

<body>

<h1>EAUR Leadership Quotes</h1>

<!-- ADMIN PANEL -->
<div class="admin">
  <h3>Admin Panel</h3>

  <input type="text" id="quote" placeholder="Enter quote">
  <input type="text" id="image" placeholder="Image URL">

  <button onclick="postData()">Post Quote</button>
</div>

<!-- POSTS DISPLAY -->
<div id="posts"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, orderBy, query } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const postsDiv = document.getElementById("posts");

/* POST DATA */
window.postData = async function(){

  let quote = document.getElementById("quote").value;
  let image = document.getElementById("image").value;

  if(!quote || !image){
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db, "posts"), {
    quote: quote,
    image: image,
    time: Date.now()
  });

  document.getElementById("quote").value = "";
  document.getElementById("image").value = "";

  loadPosts();
}

/* LOAD POSTS */
async function loadPosts(){
  postsDiv.innerHTML = "";

  const q = query(collection(db, "posts"), orderBy("time", "desc"));
  const snapshot = await getDocs(q);

  snapshot.forEach((doc) => {
    let data = doc.data();

    postsDiv.innerHTML += `
      <div class="post">
        <h3>${data.quote}</h3>
        <img src="${data.image}">
      </div>
    `;
  });
}

loadPosts();

</script>

</body>
</html>
