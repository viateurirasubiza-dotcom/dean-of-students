<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EAUR Leader Quotes</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin: 0;
  background: #eef2f7;
  text-align: center;
}

h1{
  background: #1e3a8a;
  color: white;
  padding: 20px;
  margin: 0;
}

/* ADMIN BOX */
.admin{
  background: white;
  width: 90%;
  max-width: 500px;
  margin: 20px auto;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

input{
  width: 95%;
  padding: 10px;
  margin: 8px 0;
}

button{
  background: #1e3a8a;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  width: 100%;
}

/* POSTS */
#posts{
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}

.post{
  background: white;
  width: 90%;
  max-width: 500px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.post img{
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>EAUR Leadership Quotes</h1>

<!-- ADMIN PANEL -->
<div class="admin">
  <h3>Admin Panel</h3>

  <input type="text" id="quote" placeholder="Enter quote">
  <input type="text" id="image" placeholder="Image URL">

  <button onclick="postData()">Post Quote</button>
</div>

<!-- POSTS DISPLAY -->
<div id="posts"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, orderBy, query } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const postsDiv = document.getElementById("posts");

/* POST DATA */
window.postData = async function(){

  let quote = document.getElementById("quote").value;
  let image = document.getElementById("image").value;

  if(!quote || !image){
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db, "posts"), {
    quote: quote,
    image: image,
    time: Date.now()
  });

  document.getElementById("quote").value = "";
  document.getElementById("image").value = "";

  loadPosts();
}

/* LOAD POSTS */
async function loadPosts(){
  postsDiv.innerHTML = "";

  const q = query(collection(db, "posts"), orderBy("time", "desc"));
  const snapshot = await getDocs(q);

  snapshot.forEach((doc) => {
    let data = doc.data();

    postsDiv.innerHTML += `
      <div class="post">
        <h3>${data.quote}</h3>
        <img src="${data.image}">
      </div>
    `;
  });
}

loadPosts();

</script>

</body>
</html>
