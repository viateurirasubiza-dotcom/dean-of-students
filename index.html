<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EAUR Leader Quotes</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Leadership Quotes</h1>

  <div id="posts"></div>

  <!-- Firebase + App Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyDrBUO6ZcLO5pEJP3j4okbHcbAYRpO65f0",
  authDomain: "leadre-quotes.firebaseapp.com",
  projectId: "leadre-quotes",
  storageBucket: "leadre-quotes.firebasestorage.app",
  messagingSenderId: "210400217437",
  appId: "1:210400217437:web:f2acf185fad92a769580b4"
};
    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const postsDiv = document.getElementById("posts");

    // Load posts
    async function loadPosts() {
      postsDiv.innerHTML = "";

      const q = query(collection(db, "posts"), orderBy("time", "desc"));
      const querySnapshot = await getDocs(q);

      querySnapshot.forEach((doc) => {
        let data = doc.data();

        postsDiv.innerHTML += `
          <div class="post">
            <h3>${data.quote}</h3>
            <img src="${data.image}" width="300">
          </div>
        `;
      });
    }

    loadPosts();
  </script>

</body>
</html>
